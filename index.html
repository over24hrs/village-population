        let populationData = [];

        (function () {
            const cleanCsv = CSV_DATA.replace(/^\uFEFF/, '');
            const results = Papa.parse(cleanCsv, {
                header: true,
                skipEmptyLines: true
            });

            populationData = results.data.filter(row => {
                const name = row['ชื่อ - สกุล'] || '';
                return name.trim() !== ''
                    && !name.includes('#REF!')
                    && !name.includes('#VALUE!');
            });

            renderTable(populationData);
        })();

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            document.getElementById('countDisplay').innerText = data.length;
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="px-6 py-8 text-center text-gray-500">ไม่พบข้อมูลที่ค้นหา</td></tr>';
                return;
            }

            const fragment = document.createDocumentFragment();
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-blue-50 transition-colors';

                const houseNo  = row['บ้านเลขที่'] || '-';
                const idCard   = row['เลขที่บัตรประชาชน'] || '-';
                const name     = row['ชื่อ - สกุล'] || '-';
                const ageYear  = row['อายุ(ปี)'] || '0';
                const ageMonth = row['อายุ (เดือน)'] || '0';
                const dob      = row['วันเกิด'] || '-';
                const homeReg  = row['ทะเบียนบ้าน'] || '-';
                const medical  = row['สิทธิการรักษา'] || '-';
                const edu      = row['ระดับการศึกษา'] || '-';
                const disease  = row['โรคประจำตัว'] || '-';

                tr.innerHTML = `
                    <td class="px-4 py-3 text-sm text-gray-900">${houseNo}</td>
                    <td class="px-4 py-3 text-sm font-mono text-gray-700 tracking-wider">${idCard}</td>
                    <td class="px-4 py-3 text-sm font-medium text-gray-900">${name}</td>
                    <td class="px-4 py-3 text-sm text-gray-900">${ageYear} ปี ${ageMonth} เดือน</td>
                    <td class="px-4 py-3 text-sm text-gray-900">${dob}</td>
                    <td class="px-4 py-3 text-sm text-gray-600">${homeReg}</td>
                    <td class="px-4 py-3 text-xs text-gray-700">${medical}</td>
                    <td class="px-4 py-3 text-sm text-gray-700">${edu}</td>
                    <td class="px-4 py-3 text-sm text-gray-700">${disease}</td>
                `;
                fragment.appendChild(tr);
            });
            tbody.appendChild(fragment);
        }

        document.getElementById('searchInput').addEventListener('input', function () {
            const q = this.value.trim().toLowerCase();
            if (!q) { renderTable(populationData); return; }
            const filtered = populationData.filter(row =>
                (row['ชื่อ - สกุล'] || '').toLowerCase().includes(q) ||
                (row['บ้านเลขที่'] || '').toString().includes(q) ||
                (row['เลขที่บัตรประชาชน'] || '').includes(q)
            );
            renderTable(filtered);
        });
    </script>
